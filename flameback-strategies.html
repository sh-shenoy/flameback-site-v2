<style>

  .btn:hover{gap:15px;opacity:.92}
  .mark{position:absolute;right:-10px;bottom:0;font-family:"Instrument Serif",serif;font-style:italic;font-size:clamp(150px,24vw,300px);color:var(--ink);opacity:.02;line-height:.8;pointer-events:none;white-space:nowrap}
